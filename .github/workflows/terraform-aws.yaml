name: Terraform Deployment

on:
  workflow_dispatch:

    inputs:

      service_folder:
        required: true
        type: choice

        options:
          - ec2
          - vpc

      tfvars_file:
        required: true
        type: choice

        options:
          - dev.tfvars
          - prod.tfvars

      terraform_action:
        required: true
        type: choice

        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:

  terraform:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.event.inputs.service_folder }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Download Terraform State
      run: |
        aws s3 cp \
        s3://mahesh-terraform-state/${{ github.event.inputs.service_folder }}/terraform.tfstate \
        terraform.tfstate || true

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: |
        terraform plan \
        -var-file="vars/${{ github.event.inputs.tfvars_file }}"

    - name: Terraform Apply
      if: github.event.inputs.terraform_action == 'apply'
      run: |
        terraform apply -auto-approve \
        -var-file="vars/${{ github.event.inputs.tfvars_file }}"

    - name: Terraform Destroy
      if: github.event.inputs.terraform_action == 'destroy'
      run: |
        terraform destroy -auto-approve \
        -var-file="vars/${{ github.event.inputs.tfvars_file }}"

    - name: Upload Terraform State
      run: |
        aws s3 cp terraform.tfstate \
        s3://mahesh-terraform-state/${{ github.event.inputs.service_folder }}/terraform.tfstate